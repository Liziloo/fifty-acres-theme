[info]
name = "The Fifty Acres"
version = "1.4.1"
author = "Liz Casler Loomans"
description = "Custom archival theme with fixed 280px sidebar."
theme_link = "https://github.com/Liziloo/fifty-acres-theme"
author_link = "https://thefiftyacres.com"
omeka_version_constraint = "^4.0.0"
thumbnail = "asset/img/thumbnail.png"

; --- RESOURCE PAGE CONFIGURATION (The missing part) ---
; This unlocks the "Configure resource pages" button in the Admin GUI
resource_page_regions.items.main = "Main"
resource_page_regions.item_sets.main = "Main"
resource_page_regions.media.main = "Main"

; Define default blocks for these regions so they aren't empty on first load
resource_page_blocks.items.main[] = "values"
resource_page_blocks.items.main[] = "mediaEmbeds"
resource_page_blocks.item_sets.main[] = "values"
resource_page_blocks.media.main[] = "values"

[config]
element_groups.branding = "Site Branding"
element_groups.footer = "Footer Content"

elements.logo.name = "logo"
elements.logo.type = "Omeka\Form\Element\Asset"
elements.logo.options.label = "Logo"
elements.logo.options.element_group = "branding"

elements.banner.name = "banner"
elements.banner.type = "Omeka\Form\Element\Asset"
elements.banner.options.label = "Banner Image"
elements.banner.options.element_group = "branding"

elements.banner_height.name = "banner_height"
elements.banner_height.type = "Laminas\Form\Element\Number"
elements.banner_height.options.label = "Banner Height (px)"
elements.banner_height.options.element_group = "branding"
elements.banner_height.attributes.value = "400"

elements.banner_visibility.name = "banner_visibility"
elements.banner_visibility.type = "Laminas\Form\Element\Select"
elements.banner_visibility.options.label = "Banner Visibility"
elements.banner_visibility.options.value_options.home = "Home Page Only"
elements.banner_visibility.options.value_options.all = "All Pages"
elements.banner_visibility.options.element_group = "branding"

elements.logo_alt.name = "logo_alt"
elements.logo_alt.type = "Laminas\Form\Element\Text"
elements.logo_alt.options.label = "Logo Alt Text"
elements.logo_alt.options.element_group = "branding"

elements.banner_alt.name = "banner_alt"
elements.banner_alt.type = "Laminas\Form\Element\Text"
elements.banner_alt.options.label = "Banner Alt Text"
elements.banner_alt.options.element_group = "branding"

elements.footer_text.name = "footer_text"
elements.footer_text.type = "Laminas\Form\Element\Textarea"
elements.footer_text.options.label = "Footer Text"
elements.footer_text.options.element_group = "footer"